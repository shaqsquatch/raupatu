<html>
<head>
    <title>Emoji Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .emoji-avatars { display: flex; justify-content: space-around; }
        .hud { background: #f0f0f0; padding: 10px; }
    </style>
</head>
<body>
    <div class="setup">
        <h1>Welcome to the Emoji Game!</h1>
        <div class="emoji-avatars">
            <span>😀</span>
            <span>😃</span>
            <span>😄</span>
            <span>😅</span>
        </div>
        <label>
            <input type="checkbox" id="bot-option"> Play with Bot
        </label>
        <button id="start-game">Start Game</button>
    </div>
    <div class="hud">
        <h2>Players</h2>
        <div id="players-info"></div>
        <h3>Card Hands</h3>
        <div id="card-info"></div>
    </div>
    <script>
        // Game logic will handle card drawing and emoji display
        let players = ['😀', '😃', '😄', '😅'];
        let cards = drawnCards();
        displayPlayers();

        function drawnCards() {
            return ['🔴', '🔵', '🟢']; // Simulating drawn cards
        }

        function displayPlayers() {
            let infoDiv = document.getElementById('players-info');
            players.forEach(player => {
                infoDiv.innerHTML += `${player}: ${cards.length} cards<br>`;
            });
        }
    </script>
</body>
</html>
